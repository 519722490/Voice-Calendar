spring.application.name=backend
spring.config.import=optional:file:./config/application-local.properties
voice-calendar.ai.enabled=false
voice-calendar.agent.time-zone=Asia/Shanghai
voice-calendar.agent.confirmation-ttl=PT2M
spring.ai.dashscope.enabled=false
spring.ai.dashscope.agent.enabled=false
spring.ai.dashscope.api-key=
spring.ai.dashscope.chat.options.model=qwen-plus
spring.ai.dashscope.chat.options.temperature=0.2
spring.datasource.url=${VOICE_CALENDAR_DB_URL:jdbc:postgresql://127.0.0.1:15432/voice_calendar}
spring.datasource.username=${VOICE_CALENDAR_DB_USERNAME:voice_calendar}
spring.datasource.password=${VOICE_CALENDAR_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
voice-calendar.auth.jwt-secret=${VOICE_CALENDAR_JWT_SECRET:dm9pY2UtY2FsZW5kYXItZGV2LWp3dC1zZWNyZXQtMzItYnl0ZXMtcGxlYXNlLWNoYW5nZQ==}
voice-calendar.auth.token-ttl=PT24H
voice-calendar.speech.enabled=false
voice-calendar.speech.provider=dashscope
voice-calendar.speech.api-key=
voice-calendar.speech.model=fun-asr-realtime
voice-calendar.speech.endpoint=wss://dashscope.aliyuncs.com/api-ws/v1/inference
voice-calendar.speech.sample-rate=16000
voice-calendar.speech.format=pcm
voice-calendar.speech.max-sentence-silence=1300
voice-calendar.speech.semantic-punctuation-enabled=false
