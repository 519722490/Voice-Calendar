spring.application.name=backend
spring.config.import=optional:file:./.env[.properties],optional:file:./backend/.env[.properties]
voice-calendar.ai.enabled=${VOICE_CALENDAR_AI_ENABLED:false}
voice-calendar.agent.time-zone=${VOICE_CALENDAR_AGENT_TIME_ZONE:Asia/Shanghai}
voice-calendar.agent.confirmation-ttl=${VOICE_CALENDAR_AGENT_CONFIRMATION_TTL:PT2M}
voice-calendar.agent.review-confidence-threshold=${VOICE_CALENDAR_AGENT_REVIEW_CONFIDENCE_THRESHOLD:0.45}
voice-calendar.agent.auto-confidence-threshold=${VOICE_CALENDAR_AGENT_AUTO_CONFIDENCE_THRESHOLD:0.8}
voice-calendar.assistant.time-zone=${VOICE_CALENDAR_ASSISTANT_TIME_ZONE:Asia/Shanghai}
voice-calendar.assistant.confidence-threshold=${VOICE_CALENDAR_ASSISTANT_CONFIDENCE_THRESHOLD:0.30}
spring.ai.dashscope.enabled=${SPRING_AI_DASHSCOPE_ENABLED:false}
spring.ai.dashscope.agent.enabled=${SPRING_AI_DASHSCOPE_AGENT_ENABLED:false}
spring.ai.dashscope.api-key=${SPRING_AI_DASHSCOPE_API_KEY:${DASHSCOPE_API_KEY:}}
spring.ai.dashscope.chat.options.model=${SPRING_AI_DASHSCOPE_CHAT_OPTIONS_MODEL:qwen-plus}
spring.ai.dashscope.chat.options.temperature=${SPRING_AI_DASHSCOPE_CHAT_OPTIONS_TEMPERATURE:0.2}
spring.datasource.url=${VOICE_CALENDAR_DB_URL:jdbc:postgresql://127.0.0.1:5432/voice_calendar}
spring.datasource.username=${VOICE_CALENDAR_DB_USERNAME:voice_calendar}
spring.datasource.password=${VOICE_CALENDAR_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}
voice-calendar.auth.jwt-secret=${VOICE_CALENDAR_JWT_SECRET:dm9pY2UtY2FsZW5kYXItZGV2LWp3dC1zZWNyZXQtMzItYnl0ZXMtcGxlYXNlLWNoYW5nZQ==}
voice-calendar.auth.token-ttl=${VOICE_CALENDAR_AUTH_TOKEN_TTL:PT24H}
voice-calendar.speech.enabled=${VOICE_CALENDAR_SPEECH_ENABLED:false}
voice-calendar.speech.provider=${VOICE_CALENDAR_SPEECH_PROVIDER:dashscope}
voice-calendar.speech.api-key=${VOICE_CALENDAR_SPEECH_API_KEY:${DASHSCOPE_API_KEY:}}
voice-calendar.speech.model=${VOICE_CALENDAR_SPEECH_MODEL:fun-asr-realtime}
voice-calendar.speech.endpoint=${VOICE_CALENDAR_SPEECH_ENDPOINT:wss://dashscope.aliyuncs.com/api-ws/v1/inference}
voice-calendar.speech.sample-rate=${VOICE_CALENDAR_SPEECH_SAMPLE_RATE:16000}
voice-calendar.speech.format=${VOICE_CALENDAR_SPEECH_FORMAT:pcm}
voice-calendar.speech.max-sentence-silence=${VOICE_CALENDAR_SPEECH_MAX_SENTENCE_SILENCE:1300}
voice-calendar.speech.semantic-punctuation-enabled=${VOICE_CALENDAR_SPEECH_SEMANTIC_PUNCTUATION_ENABLED:false}
